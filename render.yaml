services:
  - type: web
    name: binhnguyen-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false

  - type: web
    name: binhnguyen-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: https://binhnguyen-backend.onrender.com